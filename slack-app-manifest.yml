display_information:
  name: Shellack
  description: Bridge Slack with Claude AI for autonomous development workflows
  long_description: "Shellack integrates Claude AI with your Slack workspace to provide natural conversations about your codebase, autonomous bug investigations, and automated App Store Connect monitoring. Features: thread-based sessions, autonomous agents, App Store Connect integration, and zero-cost monitoring mode."

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Shellack
    always_online: true

oauth_config:
  scopes:
    bot:
      # --- Channel access (public & private) ---
      - app_mentions:read    # Receive @Shellack mentions in channels
      - channels:history     # Read messages in public channels the bot is in
      - channels:join        # Auto-join public channels when mentioned
      - channels:read        # List and get info about public channels
      - groups:history       # Read messages in private channels the bot is in
      - groups:read          # List and get info about private channels

      # --- Direct messages ---
      # NOTE: im:* and mpim:* can be removed if the bot does not need DM support.
      - im:history           # Read single-party DM messages
      - im:read              # List DMs the bot has been added to
      - mpim:history         # Read multi-party DM messages
      - mpim:read            # List multi-party DMs the bot has been added to

      # --- Messaging ---
      - chat:write           # Post messages and replies in threads

      # --- Canvas (project state mirrors) ---
      - canvases:read        # Read canvas content (STATE.md mirrors)
      - canvases:write       # Update canvas content (STATE.md mirrors)

      # --- Files ---
      - files:read           # Access shared files (logs, screenshots)
      - files:write          # Upload files (reports, artifacts)

      # --- Reactions ---
      - reactions:read       # Read emoji reactions (trigger detection)
      - reactions:write      # Add reactions (status indicators like :eyes:, :claude:)

      # --- Users ---
      - users:read           # Resolve user display names for messages

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
