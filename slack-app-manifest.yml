display_information:
  name: SlackClaw
  description: Bridge Slack with Claude AI for autonomous development workflows
  background_color: "#5B4CFF"
  long_description: "SlackClaw integrates Claude AI with your Slack workspace to provide natural conversations about your codebase, autonomous bug investigations, and automated App Store Connect monitoring. Features: thread-based sessions, autonomous agents, App Store Connect integration, and zero-cost monitoring mode."

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: SlackClaw
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - canvases:read
      - canvases:write
      - channels:history
      - channels:join
      - channels:read
      - chat:write
      - files:read
      - files:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - reactions:read
      - reactions:write
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
